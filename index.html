<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zsnix Studio - Premium MLBB WR</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=Play:wght@400;700&display=swap');
    
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    
    body, label, p, .result-desc { 
        font-family: 'Play', 'Rajdhani', sans-serif; 
    }
    
    body {
        min-height: 100vh; display: flex; justify-content: center; align-items: center;
        background: radial-gradient(circle at center, #001a2e 0%, #000000 100%);
        padding: 20px; color: white;
    }
    
    .container { width: 100%; max-width: 480px; text-align: center; }
    
    /* HEADER (GOLD & CYAN) */
    .header {
        font-family: 'Orbitron', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase;
        background: linear-gradient(180deg, #ffffff 10%, #00f0ff 50%, #ffcc00 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.6));
        font-size: 32px; margin-bottom: 5px;
    }
    
    .subheader { 
        font-family: 'Orbitron', sans-serif;
        font-size: 14px; color: #ffcc00; margin-bottom: 5px; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; 
    }
    .main-title { 
        font-family: 'Orbitron', sans-serif;
        font-size: 16px; color: #fff; margin-bottom: 25px; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); opacity: 0.8; 
    }

    /* MAIN CONTAINER GLOWING EFFECT */
    .glow-box {
        position: relative; overflow: hidden; border-radius: 20px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); margin-bottom: 15px; z-index: 0;
        border: 1px solid rgba(0, 240, 255, 0.2);
    }

    .glow-box::before {
        content: ""; position: absolute; width: 200%; height: 200%;
        background: conic-gradient(from 0deg, transparent, #00f0ff, transparent, #ffcc00, transparent);
        animation: rotateGlow 8s linear infinite; top: -50%; left: -50%; z-index: -2;
    }

    @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .inner-content {
        position: relative; z-index: 1; background: rgba(0, 8, 15, 0.98);
        border-radius: inherit; width: 100%; height: 100%; padding: 30px 25px;
    }
    
    /* PREMIUM INPUT & SHAPE STYLE */
    .input-group { margin-bottom: 22px; text-align: left; position: relative; }
    
    label { 
        color: #ffcc00; font-size: 11px; display: block; margin-left: 15px;
        margin-bottom: 8px; text-transform: uppercase; font-weight: 700; 
        letter-spacing: 1px;
    }
    
    .input-wrapper {
        position: relative;
        clip-path: polygon(5% 0, 100% 0, 100% 70%, 95% 100%, 0 100%, 0 30%);
        background: rgba(0, 240, 255, 0.15); /* Non-focused border */
        border: 1px solid rgba(0, 240, 255, 0.3);
        padding: 1px;
        border-radius: 4px; /* Slight radius for modern feel */
    }

    .calc-input {
        width: 100%; background: #000a14; 
        clip-path: polygon(5% 0, 100% 0, 100% 70%, 95% 100%, 0 100%, 0 30%);
        border: none; padding: 15px; color: #00f0ff; font-size: 22px; text-align: center;
        font-family: 'Orbitron', sans-serif; outline: none;
    }

    .input-wrapper:focus-within { 
        background: linear-gradient(135deg, #ffcc00, #00f0ff);
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    }
    
    /* BLUE CALCULATE BUTTON (CYAN Gradient) */
    .calc-btn { 
        width: 100%; padding: 18px; 
        background: linear-gradient(135deg, #00c2ff, #004e92, #002d5c);
        border: 1px solid rgba(255, 255, 255, 0.3);
        clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        color: #ffffff; font-weight: 900; 
        font-family: 'Orbitron', sans-serif; cursor: pointer; text-transform: uppercase;
        transition: 0.3s; font-size: 13px; letter-spacing: 1.5px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }
    .calc-btn:hover { 
        transform: translateY(-3px); 
        filter: brightness(1.1);
        box-shadow: 0 8px 15px rgba(0, 136, 204, 0.4);
        border-color: #ffffff;
    }

    .result-area {
        margin-top: 20px; padding: 20px; border-radius: 12px;
        background: rgba(0, 240, 255, 0.03); border: 1px solid rgba(0, 240, 255, 0.2);
        display: none; animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .result-title { font-family: 'Orbitron', sans-serif; color: #ffcc00; font-size: 12px; margin-bottom: 8px; display: block; letter-spacing: 2px; }
    .result-value { font-family: 'Orbitron', sans-serif; font-size: 32px; color: #fff; text-shadow: 0 0 20px rgba(0, 240, 255, 0.8); }
    
    /* SHOP SECTION (Premium Glow) */
    .shop-section {
        margin-top: 25px; padding: 20px; 
        background: rgba(255, 204, 0, 0.03);
        border: 1px solid rgba(255, 204, 0, 0.2);
        border-radius: 12px;
        position: relative;
    }
    
    .shop-section::before {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        box-shadow: 0 0 15px rgba(255, 204, 0, 0.1) inset;
        pointer-events: none;
    }

    .shop-text { color: #ffffff; font-size: 13px; margin-bottom: 15px; line-height: 1.5; opacity: 0.9; }
    
    .shop-btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        background: linear-gradient(90deg, #ffcc00, #ff8800); color: #000;
        padding: 12px 25px; border-radius: 30px; text-decoration: none;
        font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 900;
        transition: 0.3s; border: 1px solid rgba(0, 0, 0, 0.2);
    }
    .shop-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 204, 0, 0.5); }

    /* CREATOR BUTTON (Modern Dark) */
    .tg-btn {
        margin-top: 20px; width: 100%; padding: 15px;
        background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%); 
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #888; border-radius: 8px; font-family: 'Orbitron', sans-serif;
        font-size: 12px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 2px; cursor: pointer; display: flex;
        align-items: center; justify-content: center; gap: 10px;
        text-decoration: none; transition: 0.3s;
    }
    .tg-btn:hover { 
        color: #0088cc; border-color: rgba(0, 136, 204, 0.5); 
        background: linear-gradient(135deg, #111 0%, #0a0a0a 100%);
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">Zsnix Studio</div>
    <div class="subheader">Premium Gaming Tool</div>
    <div class="main-title">Mobile Legends % Win Rate</div>
    
    <div class="glow-box">
        <div class="inner-content">
            <div class="input-group">
                <label><i class="fas fa-gamepad"></i> စုစုပေါင်းပွဲအရေအတွက် (Total Matches)</label>
                <div class="input-wrapper">
                    <input type="number" id="totalMatches" class="calc-input" placeholder="0">
                </div>
            </div>

            <div class="input-group">
                <label><i class="fas fa-chart-line"></i> လက်ရှိ Win Rate (Current %)</label>
                <div class="input-wrapper">
                    <input type="number" id="currentWR" class="calc-input" placeholder="0">
                </div>
            </div>

            <div class="input-group">
                <label><i class="fas fa-bullseye"></i> ရည်မှန်းချက် Win Rate (Target %)</label>
                <div class="input-wrapper">
                    <input type="number" id="targetWR" class="calc-input" placeholder="0">
                </div>
            </div>

            <button class="calc-btn" onclick="calculateWR()">နိုင်ပွဲတွက်ချက်ရန် (Required Wins)</button>

            <div id="resultArea" class="result-area">
                <span id="resTitle" class="result-title">BATTLE ESTIMATION</span>
                <div id="winsNeeded" class="result-value">0</div>
                <p id="resDesc" style="color: #00f0ff; font-size: 14px; margin-top: 12px;"></p>
            </div>
        </div>
    </div>

    <div class="shop-section">
        <p class="shop-text">
            Ingame items နှင့် App Premium များကို ဈေးနှုန်းသက်သက်သာသာဖြင့် <br>
            <b>Zsnix Studio</b> မှာ ဝယ်ယူရရှိနိုင်ပါပြီ။
        </p>
        <a href="https://t.me/Zsnix_Rix" class="shop-btn">
            <i class="fas fa-shopping-cart"></i> BUY NOW
        </a>
    </div>

    <a href="https://t.me/Zsnix_Rix" class="tg-btn" target="_blank">
        <i class="fab fa-telegram-plane"></i> CREATED BY ZSNIX
    </a>
</div>

<script>
    function calculateWR() {
        const total = parseFloat(document.getElementById('totalMatches').value);
        const current = parseFloat(document.getElementById('currentWR').value) / 100;
        const target = parseFloat(document.getElementById('targetWR').value) / 100;

        if (!total || isNaN(current) || isNaN(target)) {
            alert("ကျေးဇူးပြု၍ ဂဏန်းများ မှန်ကန်စွာ ဖြည့်စွက်ပေးပါ။");
            return;
        }
        if (target <= current) {
            alert("Target WR သည် လက်ရှိထက် ပိုများရပါမည်။");
            return;
        }
        if (target >= 1) {
            alert("Target 100% သည် မဖြစ်နိုင်ပါ။");
            return;
        }

        const currentWins = total * current;
        const gamesToPlay = Math.ceil((target * total - currentWins) / (1 - target));
        
        document.getElementById('resultArea').style.display = "block";
        document.getElementById('winsNeeded').innerText = gamesToPlay + " Matches";
        document.getElementById('resDesc').innerText = `Target WR ရောက်ရှိရန် နောက်ထပ် ${gamesToPlay} ပွဲ ဆက်တိုက် (မရှုံးတမ်း) နိုင်ရန် လိုအပ်ပါသည်။`;
    }
</script>

</body>
</html>
